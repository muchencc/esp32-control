<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ESP32 环境监控 - FastBee</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.3.0/mqtt.min.js">
    </script>
    <style>
        /* ===== 样式（与之前相同，为节省篇幅保持简洁） ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: radial-gradient(ellipse at center, #0d1117 0%, #05080c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 820px;
            width: 100%;
            background: rgba(10, 16, 26, 0.8);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 30px 25px 40px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8), inset 0 0 60px rgba(0, 150, 255, 0.05);
            border: 1px solid rgba(100, 200, 255, 0.12);
        }
        h1 {
            text-align: center;
            font-weight: 700;
            font-size: 2rem;
            color: #b0d4ff;
            letter-spacing: 3px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
            text-shadow: 0 0 40px rgba(0, 150, 255, 0.4);
        }
        h1 small {
            font-size: 1rem;
            font-weight: 400;
            color: #6a8bb0;
            background: rgba(0, 150, 255, 0.08);
            padding: 4px 16px;
            border-radius: 30px;
            border: 1px solid rgba(0, 150, 255, 0.15);
        }
        .subtitle {
            text-align: center;
            color: #6a8bb0;
            margin-bottom: 28px;
            font-size: 0.95rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .status-badge {
            text-align: center;
            margin-bottom: 20px;
            padding: 10px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .status-badge.connected {
            background: rgba(0, 255, 100, 0.15);
            color: #4ade80;
            border: 1px solid rgba(0, 255, 100, 0.2);
        }
        .status-badge.disconnected {
            background: rgba(255, 50, 50, 0.15);
            color: #ff6b6b;
            border: 1px solid rgba(255, 50, 50, 0.2);
        }
        .status-badge .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-badge.connected .dot {
            background: #4ade80;
        }
        .status-badge.disconnected .dot {
            background: #ff6b6b;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
            margin-bottom: 28px;
        }
        .card {
            background: rgba(16, 26, 42, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 20px 12px 16px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 150, 255, 0.08);
            transition: border-color 0.3s, opacity 0.3s, filter 0.3s;
        }
        .card.hidden {
            opacity: 0.45;
            filter: grayscale(0.6);
            border-color: rgba(255, 80, 80, 0.15);
        }
        .card.hidden .value {
            color: #6a7a8a;
            text-shadow: none;
        }
        .card.hidden .label {
            color: #4a6a7a;
        }
        .card .icon {
            font-size: 2.8rem;
            line-height: 1.2;
            margin-bottom: 4px;
        }
        .card .label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #7a9ec7;
            letter-spacing: 1.2px;
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        .card .value {
            font-size: 2.2rem;
            font-weight: 700;
            color: #e0edff;
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 2px;
            line-height: 1.2;
            text-shadow: 0 0 30px rgba(0, 150, 255, 0.15);
        }
        .card .value .unit {
            font-size: 1rem;
            font-weight: 400;
            color: #4a7a9a;
            margin-left: 2px;
        }
        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(0, 150, 255, 0.08);
            border-radius: 20px;
            margin-top: 14px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            border-radius: 20px;
            transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .temp-bar {
            background: linear-gradient(90deg, #3b82f6, #ef4444);
        }
        .hum-bar {
            background: linear-gradient(90deg, #60a5fa, #2563eb);
        }
        .lux-bar {
            background: linear-gradient(90deg, #fbbf24, #f59e0b);
        }
        .card-toggle {
            margin-top: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
            padding: 6px 14px;
            border-radius: 30px;
            background: rgba(0, 150, 255, 0.05);
            border: 1px solid rgba(0, 150, 255, 0.1);
            transition: background 0.25s, border-color 0.25s;
            font-size: 0.75rem;
            font-weight: 600;
            color: #7a9ec7;
            letter-spacing: 0.5px;
        }
        .card-toggle:hover {
            background: rgba(0, 150, 255, 0.12);
            border-color: rgba(0, 150, 255, 0.25);
        }
        .card-toggle .toggle-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            transition: background 0.3s, box-shadow 0.3s;
        }
        .card-toggle .toggle-dot.on {
            background: #4ade80;
            box-shadow: 0 0 12px rgba(74, 222, 128, 0.4);
        }
        .card-toggle .toggle-dot.off {
            background: #ff6b6b;
            box-shadow: 0 0 12px rgba(255, 107, 107, 0.3);
        }
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .ctrl-btn {
            padding: 12px;
            border-radius: 30px;
            border: 1px solid rgba(0, 150, 255, 0.25);
            background: rgba(0, 150, 255, 0.08);
            color: #7ab8ff;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .ctrl-btn:hover {
            background: rgba(0, 150, 255, 0.18);
            border-color: #4aafff;
            transform: scale(1.02);
        }
        .ctrl-btn.on {
            background: rgba(255, 50, 50, 0.15);
            border-color: rgba(255, 50, 50, 0.3);
            color: #ff7b7b;
        }
        .footer {
            text-align: center;
            margin-top: 28px;
            color: #3a5a7a;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }
        .footer span {
            margin: 0 6px;
            opacity: 0.5;
        }
        .last-update {
            text-align: center;
            color: #4a7a9a;
            font-size: 0.75rem;
            margin-top: 12px;
        }
        @media (max-width: 600px) {
            .card-grid {
                grid-template-columns: 1fr 1fr;
                gap: 14px;
            }
            .card-grid .card:last-child {
                grid-column: span 2;
            }
            .container {
                padding: 20px 16px;
            }
            .card .value {
                font-size: 1.8rem;
            }
        }
        @media (max-width: 400px) {
            .card-grid {
                grid-template-columns: 1fr;
            }
            .card-grid .card:last-child {
                grid-column: span 1;
            }
            .btn-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌀 环境监控 <small>FastBee</small></h1>
        <div class="subtitle">MQTT 直连 · 数据保留在平台</div>

        <div id="conn-status" class="status-badge disconnected">
            <span class="dot"></span>连接中...
        </div>

        <!-- 三列传感器卡片 -->
        <div class="card-grid">
            <div class="card" id="card-temp">
                <div class="icon">🌡️</div>
                <div class="label">温度</div>
                <div class="value">
                    <span id="temp-value">--</span><span class="unit">℃</span>
                </div>
                <div class="progress-container">
                    <div id="temp-bar" class="progress-bar temp-bar"></div>
                </div>
                <div class="card-toggle" data-param="temperature" onclick="toggleParam('temperature')">
                    <span class="toggle-dot on" id="dot-temp"></span>
                    <span class="toggle-label" id="label-temp">显示中</span>
                </div>
            </div>
            <div class="card" id="card-hum">
                <div class="icon">💧</div>
                <div class="label">湿度</div>
                <div class="value">
                    <span id="hum-value">--</span><span class="unit">%</span>
                </div>
                <div class="progress-container">
                    <div id="hum-bar" class="progress-bar hum-bar"></div>
                </div>
                <div class="card-toggle" data-param="humidity" onclick="toggleParam('humidity')">
                    <span class="toggle-dot on" id="dot-hum"></span>
                    <span class="toggle-label" id="label-hum">显示中</span>
                </div>
            </div>
            <div class="card" id="card-lux">
                <div class="icon">☀️</div>
                <div class="label">光照</div>
                <div class="value">
                    <span id="lux-value">--</span><span class="unit">lx</span>
                </div>
                <div class="progress-container">
                    <div id="lux-bar" class="progress-bar lux-bar"></div>
                </div>
                <div class="card-toggle" data-param="lux" onclick="toggleParam('lux')">
                    <span class="toggle-dot on" id="dot-lux"></span>
                    <span class="toggle-label" id="label-lux">显示中</span>
                </div>
            </div>
        </div>

        <!-- LED & 蜂鸣器控制 -->
        <div class="btn-group">
            <button id="btn-led" class="ctrl-btn" onclick="sendCmd('led')">⚫ LED 关</button>
            <button id="btn-buzzer" class="ctrl-btn" onclick="sendCmd('buzzer')">🔇 蜂鸣器 关</button>
        </div>

        <div class="last-update" id="last-update">等待数据...</div>
        <div class="footer"><span>⏱️ 自动更新</span><span>·</span><span>📶 FastBee MQTT</span></div>
    </div>

    <script>
        // ================================================================
        //  🚀 请在此处填写您的 FastBee MQTT 连接信息
        // ================================================================

        // 🔽 修改为您的 FastBee WebSocket 地址（注意协议和端口）
        //    例如：ws://192.168.1.100:8083/mqtt  或  wss://fastbee.example.com:8084/mqtt
        const MQTT_BROKER_URL = "ws://182.39.110.118:8083/mqtt";   // ← 务必修改！

        // 从您提供的参数填入（已为您预设）
        const CLIENT_ID = "S&D427OZYW88P439&1795&1";
        const USERNAME = "18353976321";
        const PASSWORD = "P617070YY42H9F3Z";

        // 主题映射（按照 FastBee 规范）
        const TOPIC_SUB = "/1795/D427OZYW88P439/function/get";    // 前端发布指令 (控制)
        const TOPIC_PUB = "/1795/D427OZYW88P439/property/post";   // 前端订阅数据 (上报)

        // ================================================================
        //  以下代码无需修改（除非需要调整数据解析逻辑）
        // ================================================================

        let client = null;
        let isConnected = false;
        let ledState = false;
        let buzzerState = false;

        // 每个参数的显示开关 (true=显示/更新, false=隐藏/冻结)
        const paramState = {
            temperature: true,
            humidity: true,
            lux: true
        };

        // 保存最后一次接收的数据（用于恢复显示时刷新）
        let lastData = { tem: 0, hum: 0, lux: 0 };

        // DOM 引用
        const $ = id => document.getElementById(id);
        const tempValue = $('temp-value'),
            humValue = $('hum-value'),
            luxValue = $('lux-value');
        const tempBar = $('temp-bar'),
            humBar = $('hum-bar'),
            luxBar = $('lux-bar');
        const connStatus = $('conn-status'),
            lastUpdate = $('last-update');
        const cardTemp = $('card-temp'),
            cardHum = $('card-hum'),
            cardLux = $('card-lux');
        const dotTemp = $('dot-temp'),
            dotHum = $('dot-hum'),
            dotLux = $('dot-lux');
        const labelTemp = $('label-temp'),
            labelHum = $('label-hum'),
            labelLux = $('label-lux');

        function clamp(v, a, b) { return Math.min(Math.max(v, a), b); }

        // 更新 UI（尊重 paramState，若关闭则不更新数值）
        function updateUI(d) {
            // 保存最新数据
            lastData.tem = d.tem !== undefined ? d.tem : lastData.tem;
            lastData.hum = d.hum !== undefined ? d.hum : lastData.hum;
            lastData.lux = d.lux !== undefined ? d.lux : lastData.lux;

            // 温度
            if (paramState.temperature) {
                tempValue.textContent = lastData.tem.toFixed(1);
                tempBar.style.width = clamp(lastData.tem / 50 * 100, 0, 100) + '%';
            }
            // 湿度
            if (paramState.humidity) {
                humValue.textContent = lastData.hum.toFixed(1);
                humBar.style.width = clamp(lastData.hum, 0, 100) + '%';
            }
            // 光照
            if (paramState.lux) {
                luxValue.textContent = lastData.lux.toFixed(1);
                luxBar.style.width = clamp(lastData.lux / 10000 * 100, 0, 100) + '%';
            }

            // 同步 ESP32 发来的显示状态（如果包含）
            if (d.display_temperature !== undefined) {
                paramState.temperature = d.display_temperature === 1;
            }
            if (d.display_humidity !== undefined) {
                paramState.humidity = d.display_humidity === 1;
            }
            if (d.display_lux !== undefined) {
                paramState.lux = d.display_lux === 1;
            }

            applyParamState();
            lastUpdate.textContent = '最后更新: ' + new Date().toLocaleTimeString();
        }

        // 应用显示状态到卡片
        function applyParamState() {
            cardTemp.classList.toggle('hidden', !paramState.temperature);
            dotTemp.className = 'toggle-dot ' + (paramState.temperature ? 'on' : 'off');
            labelTemp.textContent = paramState.temperature ? '显示中' : '已冻结';

            cardHum.classList.toggle('hidden', !paramState.humidity);
            dotHum.className = 'toggle-dot ' + (paramState.humidity ? 'on' : 'off');
            labelHum.textContent = paramState.humidity ? '显示中' : '已冻结';

            cardLux.classList.toggle('hidden', !paramState.lux);
            dotLux.className = 'toggle-dot ' + (paramState.lux ? 'on' : 'off');
            labelLux.textContent = paramState.lux ? '显示中' : '已冻结';
        }

        // 切换参数显示状态（点击卡片内开关）
        function toggleParam(param) {
            if (!isConnected) {
                alert('MQTT 未连接，无法发送指令');
                return;
            }
            paramState[param] = !paramState[param];

            // 如果重新开启，立即用最新数据刷新该参数
            if (paramState[param]) {
                if (param === 'temperature') {
                    tempValue.textContent = lastData.tem.toFixed(1);
                    tempBar.style.width = clamp(lastData.tem / 50 * 100, 0, 100) + '%';
                } else if (param === 'humidity') {
                    humValue.textContent = lastData.hum.toFixed(1);
                    humBar.style.width = clamp(lastData.hum, 0, 100) + '%';
                } else if (param === 'lux') {
                    luxValue.textContent = lastData.lux.toFixed(1);
                    luxBar.style.width = clamp(lastData.lux / 10000 * 100, 0, 100) + '%';
                }
            }

            applyParamState();

            // 发送指令给 ESP32（告知显示屏是否显示该参数）
            const cmd = {};
            const key = 'display_' + param;
            cmd[key] = paramState[param] ? 1 : 0;
            client.publish(TOPIC_SUB, JSON.stringify(cmd));
            console.log('📤 发送显示控制:', cmd);
        }

        // 设置连接状态
        function setStatus(ok) {
            isConnected = ok;
            connStatus.className = 'status-badge ' + (ok ? 'connected' : 'disconnected');
            connStatus.innerHTML = '<span class="dot"></span>' + (ok ? '已连接' : '断开连接');
        }

        // LED / 蜂鸣器指令
        function sendCmd(type) {
            if (!isConnected) { alert('MQTT 未连接'); return; }
            const p = {};
            if (type === 'led') {
                ledState = !ledState;
                p.SetLED = ledState ? 1 : 0;
                $('btn-led').textContent = ledState ? '🔴 LED 开' : '⚫ LED 关';
                $('btn-led').className = 'ctrl-btn' + (ledState ? ' on' : '');
            }
            if (type === 'buzzer') {
                buzzerState = !buzzerState;
                p.buzzer = buzzerState ? 1 : 0;
                $('btn-buzzer').textContent = buzzerState ? '🔊 蜂鸣器 开' : '🔇 蜂鸣器 关';
                $('btn-buzzer').className = 'ctrl-btn' + (buzzerState ? ' on' : '');
            }
            client.publish(TOPIC_SUB, JSON.stringify(p));
        }

        // 连接 MQTT
        function connectMQTT() {
            setStatus(false);
            client = mqtt.connect(MQTT_BROKER_URL, {
                clientId: CLIENT_ID,
                username: USERNAME,
                password: PASSWORD,
                keepalive: 60,
                reconnectPeriod: 5000,
                connectTimeout: 30000
            });

            client.on('connect', function() {
                console.log('✅ MQTT 连接成功');
                setStatus(true);
                client.subscribe(TOPIC_PUB, { qos: 0 });
            });

            client.on('message', function(topic, msg) {
                try {
                    const raw = msg.toString();
                    const data = JSON.parse(raw);

                    // 兼容多种数据格式
                    let p = { tem: 0, hum: 0, lux: 0 };
                    if (Array.isArray(data)) {
                        data.forEach(i => {
                            if (i.id === 'temperature') p.tem = i.value;
                            if (i.id === 'humidity') p.hum = i.value;
                            if (i.id === 'lux') p.lux = i.value;
                        });
                    } else if (data.tem !== undefined || data.temperature !== undefined) {
                        p.tem = data.tem || data.temperature || 0;
                        p.hum = data.hum || 0;
                        p.lux = data.lux || 0;
                        // 可能还包含 display_xxx 字段
                        if (data.display_temperature !== undefined) p.display_temperature = data.display_temperature;
                        if (data.display_humidity !== undefined) p.display_humidity = data.display_humidity;
                        if (data.display_lux !== undefined) p.display_lux = data.display_lux;
                    } else {
                        // 尝试提取任何可能的数值
                        p.tem = data.tem || data.Temperature || 0;
                        p.hum = data.hum || data.Humidity || 0;
                        p.lux = data.lux || data.Lux || 0;
                    }
                    updateUI(p);
                } catch (e) {
                    console.log('📩 收到原始消息（非JSON）:', msg.toString());
                }
            });

            client.on('close', function() {
                console.log('❌ 断开');
                setStatus(false);
            });

            client.on('error', function(e) {
                console.error('错误:', e);
                setStatus(false);
            });
        }

        window.onload = connectMQTT;
    </script>
</body>
</html>
