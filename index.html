<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ESP32 环境监控中心</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Roboto,sans-serif; }
        body { background: radial-gradient(ellipse at center, #0d1117 0%, #05080c 100%); min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; }
        .container { max-width:800px; width:100%; background:rgba(10,16,26,0.8); backdrop-filter:blur(16px); border-radius:40px; padding:30px 25px 40px; box-shadow:0 30px 80px rgba(0,0,0,0.8), inset 0 0 60px rgba(0,150,255,0.05); border:1px solid rgba(100,200,255,0.12); }
        h1 { text-align:center; font-weight:700; font-size:2rem; color:#b0d4ff; letter-spacing:3px; margin-bottom:10px; display:flex; align-items:center; justify-content:center; gap:14px; flex-wrap:wrap; text-shadow:0 0 40px rgba(0,150,255,0.4); }
        h1 small { font-size:1rem; font-weight:400; color:#6a8bb0; background:rgba(0,150,255,0.08); padding:4px 16px; border-radius:30px; border:1px solid rgba(0,150,255,0.15); }
        .subtitle { text-align:center; color:#6a8bb0; margin-bottom:28px; font-size:0.95rem; letter-spacing:2px; text-transform:uppercase; }
        .card-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; margin-bottom:35px; }
        .card { background:rgba(16,26,42,0.7); backdrop-filter:blur(8px); border-radius:28px; padding:20px 12px 16px; text-align:center; box-shadow:0 8px 32px rgba(0,0,0,0.6); transition:transform 0.3s ease, box-shadow 0.3s; border:1px solid rgba(0,150,255,0.08); }
        .card:hover { transform:translateY(-6px); box-shadow:0 16px 48px rgba(0,100,255,0.2); border-color:rgba(0,150,255,0.25); }
        .card .icon { font-size:2.8rem; line-height:1.2; margin-bottom:4px; filter:drop-shadow(0 0 15px rgba(0,200,255,0.3)); }
        .card .label { font-size:0.85rem; font-weight:600; color:#7a9ec7; letter-spacing:1.2px; margin-bottom:6px; text-transform:uppercase; }
        .card .value { font-size:2.2rem; font-weight:700; color:#e0edff; display:flex; align-items:baseline; justify-content:center; gap:2px; line-height:1.2; transition:opacity 0.3s; text-shadow:0 0 30px rgba(0,150,255,0.15); }
        .card .value .unit { font-size:1rem; font-weight:400; color:#4a7a9a; margin-left:2px; }
        .progress-container { width:100%; height:6px; background:rgba(0,150,255,0.08); border-radius:20px; margin-top:14px; overflow:hidden; transition:opacity 0.3s; }
        .progress-bar { height:100%; width:0%; border-radius:20px; transition:width 0.5s cubic-bezier(0.34,1.56,0.64,1); }
        .temp-bar { background:linear-gradient(90deg,#3b82f6,#ef4444); }
        .hum-bar  { background:linear-gradient(90deg,#60a5fa,#2563eb); }
        .lux-bar  { background:linear-gradient(90deg,#fbbf24,#f59e0b); }
        .toggle-btn {
            background: rgba(0,150,255,0.08);
            border: 1px solid rgba(0,150,255,0.25);
            border-radius: 30px;
            padding: 8px 18px;
            margin-top: 14px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #7ab8ff;
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 0.5px;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 20px rgba(0,150,255,0.1);
        }
        .toggle-btn:hover {
            background: rgba(0,150,255,0.18);
            border-color: #4aafff;
            box-shadow: 0 0 40px rgba(0,150,255,0.3);
            transform: scale(1.02);
        }
        .toggle-btn.hidden {
            background: rgba(255,50,50,0.08);
            border-color: rgba(255,50,50,0.25);
            color: #ff7b7b;
            box-shadow: 0 0 20px rgba(255,50,0,0.1);
        }
        .toggle-btn.hidden:hover {
            background: rgba(255,50,50,0.18);
            border-color: #ff6b6b;
            box-shadow: 0 0 40px rgba(255,50,0,0.3);
        }
        .control-section { background:rgba(16,26,42,0.7); backdrop-filter:blur(8px); border-radius:28px; padding:24px 22px; box-shadow:0 8px 32px rgba(0,0,0,0.4); border:1px solid rgba(0,150,255,0.08); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px; margin-top:6px; }
        .control-label { display:flex; align-items:center; gap:12px; font-size:1.1rem; font-weight:500; color:#b0d0ff; }
        .control-label .icon { font-size:1.8rem; line-height:1; }
        .control-label .status { background:rgba(0,150,255,0.06); padding:4px 16px; border-radius:40px; font-size:0.9rem; font-weight:600; transition:0.2s; border:1px solid transparent; }
        .control-label .status.on { background:rgba(255,50,50,0.15); color:#ff7b7b; border-color:rgba(255,50,50,0.3); box-shadow:0 0 20px rgba(255,50,0,0.1); }
        .control-label .status.off { background:rgba(0,150,255,0.05); color:#6a8bb0; }
        .switch { position:relative; display:inline-block; width:56px; height:30px; flex-shrink:0; }
        .switch input { opacity:0; width:0; height:0; }
        .slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:#1a2a4a; transition:0.3s; border-radius:30px; box-shadow:inset 0 2px 8px rgba(0,0,0,0.6); }
        .slider::before { content:""; position:absolute; height:22px; width:22px; left:4px; bottom:4px; background:#4a7a9a; transition:0.3s; border-radius:50%; box-shadow:0 0 20px rgba(0,150,255,0.3); }
        input:checked + .slider { background:#4a1a2a; }
        input:checked + .slider::before { transform:translateX(26px); background:#ff6b6b; box-shadow:0 0 30px rgba(255,50,0,0.4); }
        .footer { text-align:center; margin-top:28px; color:#3a5a7a; font-size:0.8rem; letter-spacing:0.5px; }
        .footer span { margin:0 6px; opacity:0.5; }
        @media (max-width:600px) {
            .card-grid { grid-template-columns:1fr 1fr; gap:14px; }
            .card-grid .card:last-child { grid-column:span 2; }
            .container { padding:20px 16px; }
            .card .value { font-size:1.8rem; }
            .control-section { flex-direction:column; align-items:stretch; text-align:center; }
            .control-label { justify-content:center; }
            .switch { align-self:center; }
        }
        @media (max-width:400px) {
            .card-grid { grid-template-columns:1fr; }
            .card-grid .card:last-child { grid-column:span 1; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🌀 环境监控 <small>ESP32</small></h1>
    <div class="subtitle">实时数据 · 智能控制</div>
    <div class="card-grid">
        <div class="card">
            <div class="icon">🌡️</div>
            <div class="label">温度</div>
            <div class="value" id="temp-value">--<span class="unit">℃</span></div>
            <div class="progress-container"><div id="temp-bar" class="progress-bar temp-bar" style="width:0%;"></div></div>
            <button class="toggle-btn" data-index="0" id="btn-temp">关闭温度</button>
        </div>
        <div class="card">
            <div class="icon">💧</div>
            <div class="label">湿度</div>
            <div class="value" id="hum-value">--<span class="unit">%</span></div>
            <div class="progress-container"><div id="hum-bar" class="progress-bar hum-bar" style="width:0%;"></div></div>
            <button class="toggle-btn" data-index="1" id="btn-hum">关闭湿度</button>
        </div>
        <div class="card">
            <div class="icon">☀️</div>
            <div class="label">光照强度</div>
            <div class="value" id="lux-value">--<span class="unit">lx</span></div>
            <div class="progress-container"><div id="lux-bar" class="progress-bar lux-bar" style="width:0%;"></div></div>
            <button class="toggle-btn" data-index="2" id="btn-lux">关闭光照</button>
        </div>
    </div>
    <div class="control-section">
        <div class="control-label">
            <span class="icon">❓</span>
            <span>是否反馈异常</span>
            <span id="feedback-status" class="status off">否</span>
        </div>
        <label class="switch">
            <input type="checkbox" id="feedback-toggle">
            <span class="slider"></span>
        </label>
    </div>
    <div class="footer"><span>⏱️ 自动更新</span><span>·</span><span>📶 实时</span></div>
</div>
<script>
    // ============================================================
    // ⚠️ 重要：把下面这行的地址改成你的 Cpolar Web 公网地址
    // ============================================================
    const ESP32_WEB_URL = "http://5216d64.r7.cpolar.top";  // 例如 http://5216d64.r7.cpolar.top

    const tempValue = document.getElementById('temp-value');
    const humValue  = document.getElementById('hum-value');
    const luxValue  = document.getElementById('lux-value');
    const tempBar   = document.getElementById('temp-bar');
    const humBar    = document.getElementById('hum-bar');
    const luxBar    = document.getElementById('lux-bar');
    const feedbackToggle = document.getElementById('feedback-toggle');
    const feedbackStatus = document.getElementById('feedback-status');

    const btnTemp = document.getElementById('btn-temp');
    const btnHum  = document.getElementById('btn-hum');
    const btnLux  = document.getElementById('btn-lux');
    const toggleBtns = [btnTemp, btnHum, btnLux];

    const showState = [true, true, true];
    const apiEndpoints = [
        ESP32_WEB_URL + '/set_temp_display?enable=',
        ESP32_WEB_URL + '/set_hum_display?enable=',
        ESP32_WEB_URL + '/set_lux_display?enable='
    ];

    const labelMap = {
        show: ['显示温度', '显示湿度', '显示光照'],
        hide: ['关闭温度', '关闭湿度', '关闭光照']
    };

    function updateButton(index) {
        const btn = toggleBtns[index];
        if (showState[index]) {
            btn.textContent = labelMap.hide[index];
            btn.classList.remove('hidden');
        } else {
            btn.textContent = labelMap.show[index];
            btn.classList.add('hidden');
        }
    }

    function toggleCard(index) {
        showState[index] = !showState[index];
        const valueElements = [tempValue, humValue, luxValue];
        const barElements   = [tempBar, humBar, luxBar];
        valueElements[index].style.display = showState[index] ? 'flex' : 'none';
        barElements[index].style.display = showState[index] ? 'block' : 'none';
        updateButton(index);
        
        const enable = showState[index] ? 1 : 0;
        fetch(apiEndpoints[index] + enable)
            .then(response => {
                if (!response.ok) {
                    console.warn('控制失败: ', apiEndpoints[index]);
                }
            })
            .catch(err => console.warn('网络错误', err));
    }

    toggleBtns.forEach((btn, idx) => {
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            toggleCard(idx);
        });
    });

    function clamp(v,min,max){ return Math.min(Math.max(v,min),max); }
    function updateUI(data){
        let temp = data.tem!==undefined ? data.tem : 0;
        tempValue.textContent = temp.toFixed(1);
        tempBar.style.width = clamp((temp/50)*100,0,100)+'%';
        let hum = data.hum!==undefined ? data.hum : 0;
        humValue.textContent = hum.toFixed(1);
        humBar.style.width = clamp(hum,0,100)+'%';
        let lux = data.lux!==undefined ? data.lux : 0;
        luxValue.textContent = lux.toFixed(1);
        luxBar.style.width = clamp((lux/10000)*100,0,100)+'%';
    }

    function fetchData(){
        fetch(ESP32_WEB_URL + '/get_env')
            .then(r=>r.json())
            .then(data=>updateUI(data))
            .catch(err=>console.warn('数据获取失败',err));
    }

    function toggleFeedback(checked){
        const value = checked?1:0;
        fetch(ESP32_WEB_URL + '/set_light?value=' + value)
            .then(()=>{
                if(checked){
                    feedbackStatus.textContent = '是';
                    feedbackStatus.className = 'status on';
                }else{
                    feedbackStatus.textContent = '否';
                    feedbackStatus.className = 'status off';
                }
            })
            .catch(err=>console.warn('反馈控制失败',err));
    }

    feedbackToggle.addEventListener('change', function(){
        toggleFeedback(this.checked);
    });

    window.onload = function(){
        updateButton(0);
        updateButton(1);
        updateButton(2);
        fetchData();
        setInterval(fetchData, 2000);
    };
</script>
</body>
</html>
