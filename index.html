<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ESP32 环境监控</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.3.0/mqtt.min.js">
    </script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Roboto,sans-serif}
        body{background:radial-gradient(ellipse at center,#0d1117 0%,#05080c 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
        .container{max-width:800px;width:100%;background:rgba(10,16,26,0.8);backdrop-filter:blur(16px);border-radius:40px;padding:30px 25px 40px;box-shadow:0 30px 80px rgba(0,0,0,0.8),inset 0 0 60px rgba(0,150,255,0.05);border:1px solid rgba(100,200,255,0.12)}
        h1{text-align:center;font-weight:700;font-size:2rem;color:#b0d4ff;letter-spacing:3px;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;text-shadow:0 0 40px rgba(0,150,255,0.4)}
        h1 small{font-size:1rem;font-weight:400;color:#6a8bb0;background:rgba(0,150,255,0.08);padding:4px 16px;border-radius:30px;border:1px solid rgba(0,150,255,0.15)}
        .subtitle{text-align:center;color:#6a8bb0;margin-bottom:28px;font-size:0.95rem;letter-spacing:2px;text-transform:uppercase}
        .status-badge{text-align:center;margin-bottom:20px;padding:10px;border-radius:20px;font-weight:600;font-size:0.9rem;transition:0.3s}
        .status-badge.connected{background:rgba(0,255,100,0.15);color:#4ade80;border:1px solid rgba(0,255,100,0.2)}
        .status-badge.disconnected{background:rgba(255,50,50,0.15);color:#ff6b6b;border:1px solid rgba(255,50,50,0.2)}
        .status-badge .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:8px}
        .status-badge.connected .dot{background:#4ade80}
        .status-badge.disconnected .dot{background:#ff6b6b}
        .card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:35px}
        .card{background:rgba(16,26,42,0.7);backdrop-filter:blur(8px);border-radius:28px;padding:20px 12px 16px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.6);border:1px solid rgba(0,150,255,0.08)}
        .card .icon{font-size:2.8rem;line-height:1.2;margin-bottom:4px}
        .card .label{font-size:0.85rem;font-weight:600;color:#7a9ec7;letter-spacing:1.2px;margin-bottom:6px;text-transform:uppercase}
        .card .value{font-size:2.2rem;font-weight:700;color:#e0edff;display:flex;align-items:baseline;justify-content:center;gap:2px;line-height:1.2;text-shadow:0 0 30px rgba(0,150,255,0.15)}
        .card .value .unit{font-size:1rem;font-weight:400;color:#4a7a9a;margin-left:2px}
        .progress-container{width:100%;height:6px;background:rgba(0,150,255,0.08);border-radius:20px;margin-top:14px;overflow:hidden}
        .progress-bar{height:100%;width:0%;border-radius:20px;transition:width 0.5s cubic-bezier(0.34,1.56,0.64,1)}
        .temp-bar{background:linear-gradient(90deg,#3b82f6,#ef4444)}
        .hum-bar{background:linear-gradient(90deg,#60a5fa,#2563eb)}
        .lux-bar{background:linear-gradient(90deg,#fbbf24,#f59e0b)}
        .btn-group{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
        .ctrl-btn{padding:12px;border-radius:30px;border:1px solid rgba(0,150,255,0.25);background:rgba(0,150,255,0.08);color:#7ab8ff;font-weight:600;font-size:1rem;cursor:pointer;transition:all 0.25s ease}
        .ctrl-btn:hover{background:rgba(0,150,255,0.18);border-color:#4aafff;transform:scale(1.02)}
        .ctrl-btn.on{background:rgba(255,50,50,0.15);border-color:rgba(255,50,50,0.3);color:#ff7b7b}
        .footer{text-align:center;margin-top:28px;color:#3a5a7a;font-size:0.8rem;letter-spacing:0.5px}
        .footer span{margin:0 6px;opacity:0.5}
        .last-update{text-align:center;color:#4a7a9a;font-size:0.75rem;margin-top:12px}
        @media(max-width:600px){.card-grid{grid-template-columns:1fr 1fr;gap:14px}.card-grid .card:last-child{grid-column:span 2}.container{padding:20px 16px}.card .value{font-size:1.8rem}}
        @media(max-width:400px){.card-grid{grid-template-columns:1fr}.card-grid .card:last-child{grid-column:span 1}}
    </style>
</head>
<body>
<div class="container">
    <h1>🌀 环境监控 <small>ESP32</small></h1>
    <div class="subtitle">MQTT 公网直连 · 公共 Broker</div>
    <div id="conn-status" class="status-badge disconnected"><span class="dot"></span>连接中...</div>
    <div class="card-grid">
        <div class="card"><div class="icon">🌡️</div><div class="label">温度</div><div class="value"><span id="temp-value">--</span><span class="unit">℃</span></div><div class="progress-container"><div id="temp-bar" class="progress-bar temp-bar"></div></div></div>
        <div class="card"><div class="icon">💧</div><div class="label">湿度</div><div class="value"><span id="hum-value">--</span><span class="unit">%</span></div><div class="progress-container"><div id="hum-bar" class="progress-bar hum-bar"></div></div></div>
        <div class="card"><div class="icon">☀️</div><div class="label">光照</div><div class="value"><span id="lux-value">--</span><span class="unit">lx</span></div><div class="progress-container"><div id="lux-bar" class="progress-bar lux-bar"></div></div></div>
    </div>
    <div class="btn-group">
        <button id="btn-led" class="ctrl-btn" onclick="sendCmd('led')">⚫ LED 关</button>
        <button id="btn-buzzer" class="ctrl-btn" onclick="sendCmd('buzzer')">🔇 蜂鸣器 关</button>
    </div>
    <div class="last-update" id="last-update">等待数据...</div>
    <div class="footer"><span>⏱️ 自动更新</span><span>·</span><span>📶 公共 MQTT</span></div>
</div>
<script>
// ================================================================
// 公共 MQTT Broker（EMQX）
// WebSocket 地址：ws://broker.emqx.io:8083/mqtt
// ================================================================
const MQTT_BROKER_URL = "wss://broker.emqx.io:8084/mqtt";
// ⚠️ 主题与 ESP32 代码保持一致（带唯一标识）
const TOPIC_SUB = "baimuchen/esp32/control/cmd";
const TOPIC_PUB = "baimuchen/esp32/sensor/data";

let client = null;
let isConnected = false;
let ledState = false;
let buzzerState = false;

const el = id => document.getElementById(id);
const tempValue = el('temp-value'), humValue = el('hum-value'), luxValue = el('lux-value');
const tempBar = el('temp-bar'), humBar = el('hum-bar'), luxBar = el('lux-bar');
const connStatus = el('conn-status'), lastUpdate = el('last-update');

function clamp(v,a,b){return Math.min(Math.max(v,a),b)}

function updateUI(d){
    let t = d.tem || 0; tempValue.textContent = t.toFixed(1); tempBar.style.width = clamp(t/50*100,0,100)+'%';
    let h = d.hum || 0; humValue.textContent = h.toFixed(1); humBar.style.width = clamp(h,0,100)+'%';
    let l = d.lux || 0; luxValue.textContent = l.toFixed(1); luxBar.style.width = clamp(l/10000*100,0,100)+'%';
    lastUpdate.textContent = '最后更新: ' + new Date().toLocaleTimeString();
}

function setStatus(ok){
    isConnected = ok;
    connStatus.className = 'status-badge ' + (ok ? 'connected' : 'disconnected');
    connStatus.innerHTML = '<span class="dot"></span>' + (ok ? '已连接' : '断开连接');
}

function sendCmd(type){
    if(!isConnected){ alert('MQTT 未连接'); return; }
    let p = {};
    if(type==='led'){ ledState=!ledState; p.SetLED=ledState?1:0; el('btn-led').textContent = ledState?'🔴 LED 开':'⚫ LED 关'; el('btn-led').className='ctrl-btn'+(ledState?' on':''); }
    if(type==='buzzer'){ buzzerState=!buzzerState; p.buzzer=buzzerState?1:0; el('btn-buzzer').textContent = buzzerState?'🔊 蜂鸣器 开':'🔇 蜂鸣器 关'; el('btn-buzzer').className='ctrl-btn'+(buzzerState?' on':''); }
    client.publish(TOPIC_SUB, JSON.stringify(p));
}

function connectMQTT(){
    setStatus(false);
    client = mqtt.connect(MQTT_BROKER_URL, {
        keepalive: 60,
        reconnectPeriod: 5000,
        connectTimeout: 30000
    });
    client.on('connect', function(){
        console.log('✅ MQTT 连接成功');
        setStatus(true);
        client.subscribe(TOPIC_PUB, {qos:0});
    });
    client.on('message', function(topic, msg){
        try {
            let data = JSON.parse(msg.toString());
            if(Array.isArray(data)){
                let p = {tem:0,hum:0,lux:0};
                data.forEach(i=>{ if(i.id==='temperature') p.tem=i.value; if(i.id==='humidity') p.hum=i.value; if(i.id==='lux') p.lux=i.value; });
                updateUI(p);
            } else if(data.tem!==undefined || data.temperature!==undefined){
                updateUI({tem:data.tem||data.temperature||0, hum:data.hum||0, lux:data.lux||0});
            }
        } catch(e){ console.log('📩 收到:', msg.toString()); }
    });
    client.on('close', function(){ console.log('❌ 断开'); setStatus(false); });
    client.on('error', function(e){ console.error('错误:', e); setStatus(false); });
}

window.onload = connectMQTT;
</script>
</body>
</html>
